<body>

<script type="text/babel">
const {useState,useEffect,useRef}=React;
const P={bg:"#1e1e1e",b2:"#262626",b3:"#2e2e2e",b4:"#363636",ac:"#c27030",gn:"#7a9a6a",rd:"#9a6a60",am:"#b8993a",tx:"#d4d0c8",t2:"#908a7a",t3:"#666058"};
const SH="4px 4px 0 #111",FT="system-ui,-apple-system,sans-serif",SK="cf-s1";
const API="https://script.google.com/macros/s/AKfycbzBLRn7Lzotuwj-F3EqyM89lgIq9JUlfGpt4XRL_nQf4KO19vYsysq1AFdsjxL2LhzL/exec";
const uid=()=>Math.random().toString(36).slice(2,9);
const fm=n=>Math.abs(n).toLocaleString("ru-RU")+" ₽";
const tds=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const MR=["ЯНВАРЬ","ФЕВРАЛЬ","МАРТ","АПРЕЛЬ","МАЙ","ИЮНЬ","ИЮЛЬ","АВГУСТ","СЕНТЯБРЬ","ОКТЯБРЬ","НОЯБРЬ","ДЕКАБРЬ"];
const MS=["ЯНВ","ФЕВ","МАР","АПР","МАЙ","ИЮН","ИЮЛ","АВГ","СЕН","ОКТ","НОЯ","ДЕК"];
const WD=["ВС","ПН","ВТ","СР","ЧТ","ПТ","СБ"];
const EC=["ПРОДУКТЫ","БЕНЗИН","СВЯЗЬ","ИНТЕРНЕТ","КРЕДИТ","ДОЛГ","АРЕНДА","КВАРТПЛАТА","АЛИМЕНТЫ","КОРМ","БЫТ.ХИМИЯ","ТРАНСПОРТ","ЗДОРОВЬЕ","ОДЕЖДА","ПРОЧЕЕ"];
const IC=["ЗАРПЛАТА","ПРЕМИЯ","ПЕНСИЯ","ПОДРАБОТКА","ФРИЛАНС","ПРОЧЕЕ"];
const DEF=[
  {id:"s1",type:"income",amount:60000,cat:"ЗАРПЛАТА",desc:"Зарплата",date:"2025-12-10",repeat:"monthly"},
  {id:"s2",type:"income",amount:23000,cat:"ПЕНСИЯ",desc:"Пенсия",date:"2025-12-03",repeat:"monthly"},
  {id:"s3",type:"income",amount:25000,cat:"ПРЕМИЯ",desc:"Премия",date:"2025-12-15",repeat:"monthly"},
  {id:"s4",type:"expense",amount:23000,cat:"АРЕНДА",desc:"Аренда квартиры",date:"2025-12-01",repeat:"monthly"},
  {id:"s5",type:"expense",amount:25000,cat:"АЛИМЕНТЫ",desc:"Алименты",date:"2025-12-05",repeat:"monthly"},
  {id:"s6",type:"expense",amount:7000,cat:"КВАРТПЛАТА",desc:"Квартплата",date:"2025-12-10",repeat:"monthly"},
  {id:"s7",type:"expense",amount:1000,cat:"ИНТЕРНЕТ",desc:"Интернет",date:"2025-12-15",repeat:"monthly"},
  {id:"s8",type:"expense",amount:1200,cat:"СВЯЗЬ",desc:"Связь МТС",date:"2025-12-12",repeat:"monthly"},
  {id:"s9",type:"expense",amount:2000,cat:"КОРМ",desc:"Корм собаке",date:"2025-12-01",repeat:"monthly"},
  {id:"s10",type:"expense",amount:2000,cat:"БЫТ.ХИМИЯ",desc:"Быт.химия",date:"2025-12-01",repeat:"monthly"},
  {id:"s11",type:"expense",amount:2000,cat:"БЕНЗИН",desc:"Бензин",date:"2025-12-01",repeat:"monthly"},
  {id:"i1",type:"income",amount:14000,cat:"ЗАРПЛАТА",desc:"Зарплата",date:"2025-12-12",repeat:"once"},
  {id:"i2",type:"income",amount:25000,cat:"ПРЕМИЯ",desc:"Премия",date:"2025-12-17",repeat:"once"},
  {id:"e1",type:"expense",amount:7000,cat:"ДОЛГ",desc:"Долг брату",date:"2025-12-12",repeat:"once"},
  {id:"e2",type:"expense",amount:1250,cat:"КРЕДИТ",desc:"Кредит",date:"2025-12-12",repeat:"once"},
  {id:"e3",type:"expense",amount:1573,cat:"ПРОДУКТЫ",desc:"Продукты",date:"2025-12-12",repeat:"once"},
  {id:"e4",type:"expense",amount:285,cat:"ПРОДУКТЫ",desc:"Продукты",date:"2025-12-12",repeat:"once"},
  {id:"e5",type:"expense",amount:40,cat:"ПРОДУКТЫ",desc:"Продукты",date:"2025-12-12",repeat:"once"},
  {id:"e6",type:"expense",amount:1220,cat:"СВЯЗЬ",desc:"МТС",date:"2025-12-12",repeat:"once"},
  {id:"e7",type:"expense",amount:1000,cat:"БЕНЗИН",desc:"Бензин",date:"2025-12-13",repeat:"once"},
  {id:"e8",type:"expense",amount:273,cat:"ПРОДУКТЫ",desc:"Продукты",date:"2025-12-13",repeat:"once"},
  {id:"e9",type:"expense",amount:239,cat:"ПРОДУКТЫ",desc:"Продукты",date:"2025-12-13",repeat:"once"},
  {id:"e10",type:"expense",amount:945,cat:"ПРОДУКТЫ",desc:"Продукты",date:"2025-12-14",repeat:"once"},
  {id:"e11",type:"expense",amount:3000,cat:"ПРОДУКТЫ",desc:"Продукты",date:"2025-12-14",repeat:"once"},
  {id:"e12",type:"expense",amount:1140,cat:"ИНТЕРНЕТ",desc:"Интернет",date:"2025-12-17",repeat:"once"},
  {id:"e13",type:"expense",amount:160,cat:"ПРОЧЕЕ",desc:"VPN",date:"2025-12-17",repeat:"once"},
  {id:"e14",type:"expense",amount:10000,cat:"ДОЛГ",desc:"Долг Олегу",date:"2025-12-17",repeat:"once"},
  {id:"e15",type:"expense",amount:1000,cat:"ПРОДУКТЫ",desc:"Продукты",date:"2025-12-17",repeat:"once"},
  {id:"e16",type:"expense",amount:5029,cat:"КРЕДИТ",desc:"Кредит",date:"2025-12-17",repeat:"once"},
  {id:"e17",type:"expense",amount:42,cat:"ПРОЧЕЕ",desc:"Авито",date:"2025-12-17",repeat:"once"},
  {id:"e18",type:"expense",amount:1072,cat:"ПРОЧЕЕ",desc:"Помпа",date:"2025-12-17",repeat:"once"},
  {id:"d1",type:"expense",amount:5000,cat:"КРЕДИТ",desc:"Кредит 1/3",date:"2026-01-20",repeat:"once"},
  {id:"d2",type:"expense",amount:5000,cat:"КРЕДИТ",desc:"Кредит 2/3",date:"2026-02-03",repeat:"once"},
  {id:"d3",type:"expense",amount:5000,cat:"КРЕДИТ",desc:"Кредит 3/3",date:"2026-02-17",repeat:"once"},
  {id:"d4",type:"expense",amount:1000,cat:"ДОЛГ",desc:"Долг Жека",date:"2026-01-25",repeat:"once"},
  {id:"d5",type:"expense",amount:7000,cat:"ПРОЧЕЕ",desc:"Налог ИП",date:"2025-12-28",repeat:"once"},
  {id:"d6",type:"expense",amount:15000,cat:"ПРОЧЕЕ",desc:"Ноутбук",date:"2026-06-01",repeat:"once"},
];
const DG={name:"ПОДУШКА БЕЗОПАСНОСТИ",target:100000,current:0,rate:10};

// === SYNC ===
async function cloudLoad(){
  try{const r=await fetch(API+"?action=load");const t=await r.text();const d=JSON.parse(t);if(d&&d.items)return d;return null}catch(e){return null}
}
async function cloudSave(data){
  try{await fetch(API+"?action=save",{method:"POST",body:JSON.stringify(data)})}catch(e){}
}

const si={fontFamily:FT,background:P.b3,color:P.tx,border:"2px solid #3a3630",padding:"10px 12px",fontSize:15,width:"100%",borderRadius:0,boxSizing:"border-box"};
const sl={display:"block",fontSize:10,fontWeight:700,letterSpacing:1,color:P.t2,marginBottom:4,textTransform:"uppercase"};
const sb=a=>({padding:"8px 12px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",margin:"0 4px 4px 0",background:a?P.ac:P.b4,color:a?"#1a1a1a":P.t2,boxShadow:a?"2px 2px 0 #111":"none"});
const mmb=p=>({display:"block",width:"100%",padding:14,fontSize:13,fontWeight:900,letterSpacing:2,textTransform:"uppercase",border:"none",cursor:"pointer",marginTop:8,background:p?P.ac:P.b3,color:p?"#1a1a1a":P.tx,boxShadow:SH,fontFamily:FT});

function Mdl({children,onClose}){return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:20,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}><div style={{background:P.b2,width:"100%",maxWidth:500,maxHeight:"85vh",overflowY:"auto",padding:20,borderTop:"3px solid "+P.ac}}>{children}</div></div>}

function AddForm({type,onAdd,onClose}){const [a,sA]=useState("");const [d,sD]=useState(tds());const cs=type==="income"?IC:EC;const [c,sC]=useState(cs[0]);const [de,sDe]=useState("");const [r,sR]=useState("once");const co=type==="income"?P.gn:P.rd;
  return <Mdl onClose={onClose}><div style={{fontSize:18,fontWeight:900,letterSpacing:3,marginBottom:16,color:co}}>{type==="income"?"＋ ДОХОД":"－ РАСХОД"}</div>
    <div style={{marginBottom:14}}><div style={sl}>сумма</div><input style={{...si,fontSize:26,fontWeight:900,textAlign:"center",padding:"14px",borderColor:co}} type="number" inputMode="numeric" placeholder="0" value={a} onChange={e=>sA(e.target.value)} autoFocus/></div>
    <div style={{marginBottom:14}}><div style={sl}>категория</div><div style={{display:"flex",flexWrap:"wrap"}}>{cs.map(x=><button key={x} style={sb(c===x)} onClick={()=>sC(x)}>{x}</button>)}</div></div>
    <div style={{marginBottom:14}}><div style={sl}>описание</div><input style={si} placeholder="Что именно?" value={de} onChange={e=>sDe(e.target.value)}/></div>
    <div style={{marginBottom:14}}><div style={sl}>дата</div><input style={si} type="date" value={d} onChange={e=>sD(e.target.value)}/></div>
    <div style={{marginBottom:14}}><div style={sl}>повторять</div><div style={{display:"flex"}}>{[["once","РАЗОВО"],["monthly","ЕЖЕМЕСЯЧНО"],["weekly","ЕЖЕНЕДЕЛЬНО"]].map(([v,l])=><button key={v} style={{...sb(r===v),flex:1,margin:0,textAlign:"center"}} onClick={()=>sR(v)}>{l}</button>)}</div></div>
    <button style={mmb(true)} onClick={()=>{const v=parseInt(a);if(!v||v<=0)return;onAdd({id:uid(),type,amount:v,cat:c,desc:de||c,date:d,repeat:r})}}>ДОБАВИТЬ</button><button style={mmb(false)} onClick={onClose}>ОТМЕНА</button></Mdl>}

function Stg({goal,onGoal,onExport,onReset,onSync,syncStatus,onClose}){const [n,sN]=useState(goal.name);const [t,sT]=useState(String(goal.target));const [cu,sCu]=useState(String(goal.current));const [r,sR]=useState(String(goal.rate));
  return <Mdl onClose={onClose}><div style={{fontSize:16,fontWeight:900,letterSpacing:3,marginBottom:16,color:P.ac}}>⚙ НАСТРОЙКИ</div>
    <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:P.t2,marginBottom:8,borderBottom:"1px solid "+P.b4,paddingBottom:6}}>ЦЕЛЬ НАКОПЛЕНИЯ</div>
    <div style={{marginBottom:10}}><div style={sl}>название</div><input style={si} value={n} onChange={e=>sN(e.target.value)}/></div>
    <div style={{display:"flex",gap:8,marginBottom:10}}><div style={{flex:1}}><div style={sl}>цель ₽</div><input style={si} type="number" inputMode="numeric" value={t} onChange={e=>sT(e.target.value)}/></div><div style={{flex:1}}><div style={sl}>накоплено ₽</div><input style={si} type="number" inputMode="numeric" value={cu} onChange={e=>sCu(e.target.value)}/></div></div>
    <div style={{marginBottom:14}}><div style={sl}>% заплати себе</div><input style={{...si,width:80}} type="number" min="0" max="50" value={r} onChange={e=>sR(e.target.value)}/></div>
    <button style={mmb(true)} onClick={()=>onGoal({name:n.toUpperCase(),target:parseInt(t)||0,current:parseInt(cu)||0,rate:parseInt(r)||10})}>СОХРАНИТЬ</button>
    <div style={{marginTop:20,fontSize:11,fontWeight:700,letterSpacing:2,color:P.t2,marginBottom:8,borderBottom:"1px solid "+P.b4,paddingBottom:6}}>СИНХРОНИЗАЦИЯ</div>
    <div style={{fontSize:12,color:P.t2,marginBottom:8}}>Статус: <span style={{color:syncStatus==="ok"?P.gn:syncStatus==="err"?P.rd:P.am}}>{syncStatus==="ok"?"ПОДКЛЮЧЕНО":syncStatus==="err"?"ОШИБКА":"ЗАГРУЗКА..."}</span></div>
    <button style={mmb(false)} onClick={()=>{onSync();onClose()}}>🔄 СИНХРОНИЗИРОВАТЬ СЕЙЧАС</button>
    <div style={{marginTop:20,fontSize:11,fontWeight:700,letterSpacing:2,color:P.t2,marginBottom:8,borderBottom:"1px solid "+P.b4,paddingBottom:6}}>ДЕЙСТВИЯ</div>
    <button style={mmb(false)} onClick={()=>{onExport();onClose()}}>📄 ЭКСПОРТ CSV</button><button style={{...mmb(false),color:P.rd,marginTop:12}} onClick={()=>{if(confirm("СБРОСИТЬ ВСЕ?")){onReset();onClose()}}}>СБРОС ДАННЫХ</button></Mdl>}

function App(){
  const loadLocal=()=>{try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);return d}}catch(e){}return null};
  const saved=loadLocal();
  const [items,setItems]=useState(saved&&saved.items?saved.items:DEF);
  const [goal,setGoal]=useState(saved&&saved.goal?saved.goal:DG);
  const [vm,setVm]=useState(new Date().getMonth());
  const [vy,setVy]=useState(new Date().getFullYear());
  const [mod,setMod]=useState(null);
  const [sv,setSv]=useState(false);
  const [syncSt,setSyncSt]=useState("load");
  const isMount=useRef(true);

  // Load from cloud on start
  useEffect(()=>{
    cloudLoad().then(d=>{
      if(d&&d.items&&d.items.length>0){
        setItems(d.items);
        if(d.goal)setGoal(d.goal);
        localStorage.setItem(SK,JSON.stringify(d));
        setSyncSt("ok");
      } else {
        // No cloud data — push local to cloud
        const local=loadLocal();
        if(local&&local.items)cloudSave(local);
        setSyncSt("ok");
      }
    }).catch(()=>setSyncSt("err"));
  },[]);

  // Save locally + to cloud on every change
  useEffect(()=>{
    if(isMount.current){isMount.current=false;return}
    const data={items,goal};
    try{localStorage.setItem(SK,JSON.stringify(data))}catch(e){}
    setSv(true);setTimeout(()=>setSv(false),1200);
    // Debounced cloud save
    const t=setTimeout(()=>{cloudSave(data).then(()=>setSyncSt("ok")).catch(()=>setSyncSt("err"))},1500);
    return()=>clearTimeout(t);
  },[items,goal]);

  const forceSync=()=>{
    setSyncSt("load");
    cloudLoad().then(d=>{
      if(d&&d.items&&d.items.length>0){setItems(d.items);if(d.goal)setGoal(d.goal);localStorage.setItem(SK,JSON.stringify(d))}
      setSyncSt("ok");
    }).catch(()=>setSyncSt("err"));
  };

  const dim=new Date(vy,vm+1,0).getDate();
  const days={};
  items.forEach(it=>{const d=new Date(it.date),od=d.getDate();
    if(it.repeat==="monthly"){const dy=Math.min(od,dim);if(!days[dy])days[dy]=[];days[dy].push({...it,src:"plan"})}
    else if(it.repeat==="weekly"){const wd=d.getDay();for(let dd=1;dd<=dim;dd++)if(new Date(vy,vm,dd).getDay()===wd){if(!days[dd])days[dd]=[];days[dd].push({...it,src:"plan"})}}
    else if(d.getMonth()===vm&&d.getFullYear()===vy){if(!days[od])days[od]=[];days[od].push({...it,src:"fact"})}
  });
  const now=new Date(),isCur=now.getMonth()===vm&&now.getFullYear()===vy,tday=now.getDate();
  let totalInc=0,totalExp=0;Object.values(days).forEach(evts=>evts.forEach(e=>{if(e.type==="income")totalInc+=e.amount;else totalExp+=e.amount}));
  const bal=totalInc-totalExp,payself=Math.round(totalInc*goal.rate/100),gPct=goal.target?Math.min(Math.round(goal.current/goal.target*100),100):0;
  const chM=dir=>{let m=vm+dir,y=vy;if(m>11){m=0;y++}if(m<0){m=11;y--}setVm(m);setVy(y)};
  const exportCSV=()=>{const rows=[["День","Тип","Категория","Описание","Сумма"]];for(let d=1;d<=dim;d++){const ev=days[d];if(!ev)continue;ev.forEach(e=>rows.push([d+" "+MS[vm],e.type==="income"?"ДОХОД":"РАСХОД",e.cat,e.desc,e.type==="income"?e.amount:-e.amount]))}rows.push([],["","","","ДОХОД",totalInc],["","","","РАСХОД",totalExp],["","","","БАЛАНС",bal]);const blob=new Blob(["\uFEFF"+rows.map(r=>r.join(";")).join("\n")],{type:"text/csv"});const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download="cashflow_"+MR[vm]+"_"+vy+".csv";a.click();URL.revokeObjectURL(u)};
  const copyA=()=>{const cm={};let pI=0,pE=0;Object.values(days).forEach(evts=>evts.forEach(e=>{if(e.type==="expense")cm[e.cat]=(cm[e.cat]||0)+e.amount;if(e.src==="plan"){if(e.type==="income")pI+=e.amount;else pE+=e.amount}}));const cl=Object.entries(cm).sort((a,b)=>b[1]-a[1]).map(([c,a])=>c+": "+fm(a)+" ("+(totalExp?Math.round(a/totalExp*100):0)+"%)").join("\n");const fI=items.filter(i=>i.repeat==="once"&&i.type==="income").filter(i=>{const d=new Date(i.date);return d.getMonth()===vm&&d.getFullYear()===vy}).reduce((s,i)=>s+i.amount,0);const fE=items.filter(i=>i.repeat==="once"&&i.type==="expense").filter(i=>{const d=new Date(i.date);return d.getMonth()===vm&&d.getFullYear()===vy}).reduce((s,i)=>s+i.amount,0);const fd=items.filter(i=>i.repeat==="once"&&i.type==="expense"&&new Date(i.date)>new Date()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,10).map(i=>new Date(i.date).getDate()+" "+MS[new Date(i.date).getMonth()]+" "+new Date(i.date).getFullYear()+": "+i.desc+" -"+fm(i.amount));const txt="CASHFLOW "+MR[vm]+" "+vy+"\n\nДоход: "+fm(totalInc)+"\nРасход: "+fm(totalExp)+"\nБаланс: "+(bal>=0?"+":"")+fm(bal)+"\nЗаплати себе ("+goal.rate+"%): "+fm(payself)+"\n\nРАСХОДЫ ПО КАТЕГОРИЯМ:\n"+cl+"\n\nПЛАН vs ФАКТ:\nПлан доход: "+fm(pI)+" | Факт: "+fm(fI)+"\nПлан расход: "+fm(pE)+" | Факт: "+fm(fE)+(fd.length?"\n\nДОЛГИ:\n"+fd.join("\n"):"")+"\n\nЦЕЛЬ: "+goal.name+"\n"+fm(goal.current)+" из "+fm(goal.target)+" ("+gPct+"%)\n\nМакс, проанализируй мои финансы и дай рекомендации.";navigator.clipboard.writeText(txt).then(()=>alert("Скопировано! Вставь в чат Максу")).catch(()=>{const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Скопировано!")})};

  return <div style={{display:"flex",flexDirection:"column",height:"100vh",maxWidth:900,margin:"0 auto",fontFamily:FT,background:P.bg,color:P.tx,overflow:"hidden"}}>
    <div style={{background:P.b2,padding:"12px 16px",borderBottom:"3px solid "+P.ac,boxShadow:"0 4px 0 #111",flexShrink:0,zIndex:2}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div><div style={{fontSize:18,fontWeight:900,letterSpacing:5}}>CASHFLOW</div>
          <div style={{display:"flex",gap:8,marginTop:2}}>
            <div style={{fontSize:9,color:P.gn,opacity:sv?1:0,transition:"opacity .4s",letterSpacing:2}}>СОХРАНЕНО ✓</div>
            <div style={{fontSize:9,letterSpacing:1,color:syncSt==="ok"?P.gn:syncSt==="err"?P.rd:P.am}}>{syncSt==="ok"?"☁ SYNC":syncSt==="err"?"☁ ОШИБКА":"☁ ..."}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}><button style={{width:36,height:36,background:P.b3,border:"none",color:P.t2,fontSize:16,cursor:"pointer",boxShadow:SH,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={copyA}>📊</button><button style={{width:36,height:36,background:P.b3,border:"none",color:P.t2,fontSize:16,cursor:"pointer",boxShadow:SH,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setMod("set")}>⚙</button></div>
      </div>
      <div style={{display:"flex",gap:6}}><div style={{flex:1,background:P.b3,padding:"8px 10px"}}><div style={{fontSize:9,color:P.t2,fontWeight:700,letterSpacing:1}}>ДОХОД</div><div style={{fontSize:16,fontWeight:900,color:P.gn,marginTop:2}}>{fm(totalInc)}</div></div><div style={{flex:1,background:P.b3,padding:"8px 10px"}}><div style={{fontSize:9,color:P.t2,fontWeight:700,letterSpacing:1}}>РАСХОД</div><div style={{fontSize:16,fontWeight:900,color:P.rd,marginTop:2}}>{fm(totalExp)}</div></div><div style={{flex:1,background:P.b3,padding:"8px 10px"}}><div style={{fontSize:9,color:P.t2,fontWeight:700,letterSpacing:1}}>БАЛАНС</div><div style={{fontSize:16,fontWeight:900,color:bal>=0?P.gn:P.rd,marginTop:2}}>{bal>=0?"+":""}{fm(bal)}</div></div></div>
      <div style={{display:"flex",gap:6,marginTop:6}}><div style={{flex:1,background:"linear-gradient(135deg,#2a2218,#262626)",border:"1px solid "+P.ac+"30",padding:"8px 10px"}}><div style={{fontSize:9,color:P.ac,fontWeight:700,letterSpacing:1}}>ЗАПЛАТИ СЕБЕ {goal.rate}%</div><div style={{fontSize:16,fontWeight:900,color:P.ac,marginTop:2}}>{fm(payself)}</div></div><div style={{flex:1,background:"linear-gradient(135deg,#2a2818,#262626)",border:"1px solid "+P.am+"30",padding:"8px 10px",cursor:"pointer"}} onClick={()=>setMod("set")}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontSize:9,color:P.am,fontWeight:700,letterSpacing:1}}>ЦЕЛЬ</div><div style={{fontSize:9,color:P.am,fontWeight:700}}>{gPct}%</div></div><div style={{height:4,background:P.bg,marginTop:4}}><div style={{height:"100%",width:gPct+"%",background:P.am}}/></div><div style={{fontSize:11,color:P.t2,marginTop:3}}>{fm(goal.current)} / {fm(goal.target)}</div></div></div>
    </div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px",background:P.b2,flexShrink:0,borderBottom:"1px solid #3a3630"}}><button style={{width:36,height:36,background:P.b3,border:"none",color:P.tx,fontSize:16,cursor:"pointer",boxShadow:SH,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>chM(-1)}>◀</button><div style={{fontSize:15,fontWeight:900,letterSpacing:3}}>{MR[vm]} {vy}</div><button style={{width:36,height:36,background:P.b3,border:"none",color:P.tx,fontSize:16,cursor:"pointer",boxShadow:SH,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>chM(1)}>▶</button></div>
    <div style={{display:"flex",gap:8,padding:"8px 16px",background:P.bg,flexShrink:0}}><button style={{flex:1,padding:"12px 0",fontSize:14,fontWeight:900,letterSpacing:3,border:"none",cursor:"pointer",background:P.gn,color:"#1a1a1a",boxShadow:SH,fontFamily:FT}} onClick={()=>setMod("inc")}>＋ ДОХОД</button><button style={{flex:1,padding:"12px 0",fontSize:14,fontWeight:900,letterSpacing:3,border:"none",cursor:"pointer",background:P.rd,color:"#1a1a1a",boxShadow:SH,fontFamily:FT}} onClick={()=>setMod("exp")}>－ РАСХОД</button></div>
    <div style={{flex:1,overflowY:"auto",padding:"8px 16px 20px",WebkitOverflowScrolling:"touch"}}>
      {Array.from({length:dim},(_,i)=>i+1).map(day=>{const evts=days[day];if(!evts||!evts.length)return null;const hi=isCur&&day===tday,soon=isCur&&day>tday&&day<=tday+3;const di=evts.filter(e=>e.type==="income").reduce((a,e)=>a+e.amount,0),de2=evts.filter(e=>e.type!=="income").reduce((a,e)=>a+e.amount,0);const wd=WD[new Date(vy,vm,day).getDay()];
        return <div key={day} style={{background:P.b2,marginBottom:6,boxShadow:"2px 2px 0 #111",border:"2px solid "+(hi?P.ac:soon?P.am:"transparent")}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 12px",background:hi?P.b3:soon?"rgba(184,153,58,.06)":P.b2}}><div style={{fontSize:13,fontWeight:900,color:hi?P.ac:soon?P.am:P.tx}}>{day} {MS[vm]} <span style={{color:P.t2,fontWeight:400,fontSize:11}}>{wd}</span>{hi&&<span style={{fontSize:9,color:P.ac,marginLeft:6,fontWeight:700}}>СЕГОДНЯ</span>}{soon&&<span style={{fontSize:9,color:P.am,marginLeft:6,fontWeight:700}}>СКОРО</span>}</div><div style={{fontSize:11,fontWeight:700}}>{di>0&&<span style={{color:P.gn}}>+{fm(di)}</span>}{di>0&&de2>0&&<span style={{color:P.t3}}> / </span>}{de2>0&&<span style={{color:P.rd}}>-{fm(de2)}</span>}</div></div>
          {evts.sort((a,b)=>a.type==="income"?-1:1).map((ev,i)=>{const col=ev.type==="income"?P.gn:P.rd,isPlan=ev.src==="plan";
            return <div key={i} style={{display:"flex",alignItems:"center",padding:"5px 12px 5px 18px",borderLeft:"3px solid "+col,background:P.bg}}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:4}}>{isPlan&&<span style={{fontSize:7,fontWeight:700,letterSpacing:1,padding:"1px 5px",background:ev.type==="income"?"rgba(122,154,106,.12)":"rgba(154,106,96,.12)",color:col}}>ПЛАН</span>}<span style={{fontSize:13,color:P.tx}}>{ev.desc}</span></div><div style={{fontSize:10,color:P.t2,marginTop:1}}>{ev.cat}{isPlan?ev.repeat==="monthly"?" · ежемес.":" · еженед.":""}</div></div><div style={{fontSize:14,fontWeight:900,color:col,whiteSpace:"nowrap",marginLeft:8}}>{ev.type==="income"?"+":"-"}{fm(ev.amount)}</div><button style={{color:P.t3,fontSize:16,background:"none",border:"none",cursor:"pointer",marginLeft:6,padding:"0 4px"}} onClick={()=>setItems(items.filter(x=>x.id!==ev.id))}>×</button></div>})}
        </div>})}
      {Object.keys(days).length===0&&<div style={{textAlign:"center",color:P.t2,padding:40,fontSize:13}}>ПУСТО</div>}
    </div>
    {mod==="inc"&&<AddForm type="income" onAdd={it=>{setItems([...items,it]);setMod(null)}} onClose={()=>setMod(null)}/>}
    {mod==="exp"&&<AddForm type="expense" onAdd={it=>{setItems([...items,it]);setMod(null)}} onClose={()=>setMod(null)}/>}
    {mod==="set"&&<Stg goal={goal} onGoal={g=>{setGoal(g);setMod(null)}} onExport={exportCSV} onReset={()=>{setItems(DEF);setGoal(DG);localStorage.removeItem(SK);cloudSave({items:DEF,goal:DG})}} onSync={forceSync} syncStatus={syncSt} onClose={()=>setMod(null)}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
